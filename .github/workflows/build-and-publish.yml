name: Build and Publish to Modrinth

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: Changelog for this release
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Get version
        run: |
          echo "MOD_VERSION=$(grep '^mod_version' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV
          echo "MC_VERSION=$(grep '^minecraft_version' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV

      - name: Build with Gradle
        run: ./gradlew build

      - name: Publish to Modrinth
        uses: RubixDev/modrinth-publisher@v1
        with:
          token: ${{ secrets.MODRINTH_PAT }}
          project-id: vPtqse2p
          filename: build/libs/Ninjabowtie-Server-Utility-${{ env.MOD_VERSION }}.jar
          name: Ninjabowtie Server Utility ${{ env.MOD_VERSION }}
          version-number: ${{ env.MOD_VERSION }}
          changelog: ${{ github.event.inputs.changelog }}
          game-versions: |
            ${{ env.MC_VERSION }}
            26.2
          loaders: fabric
          detect-loaders: false
