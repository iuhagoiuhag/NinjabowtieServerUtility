name: Build and Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Mod version (e.g. 1.0.1)
        required: true
      changelog:
        description: Changelog for this release
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Get version
        run: |
          sed -i "s/^mod_version=.*/mod_version=${{ inputs.version }}/" gradle.properties
          echo "MOD_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          echo "MC_VERSION=$(grep '^minecraft_version' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV
          echo "JAVA_VERSION=$(grep '^java_version' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV

      - name: Build with Gradle
        run: ./gradlew build

      - name: Publish to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: vPtqse2p
          modrinth-token: ${{ secrets.MODRINTH_PAT }}
          curseforge-id: 1611584
          curseforge-token: ${{ secrets.CURSEFORGE_PAT }}
          files: build/libs/Ninjabowtie-Server-Utility-${{ env.MOD_VERSION }}.jar
          name: Ninjabowtie Server Utility ${{ env.MOD_VERSION }}
          version: ${{ env.MOD_VERSION }}
          changelog: ${{ github.event.inputs.changelog }}
          game-versions: ${{ env.MC_VERSION }}
          loaders: fabric
          java: ${{ env.JAVA_VERSION }}
